# Pre-commit hooks configuration
# See https://pre-commit.com for more information

repos:
  # 1. Pre-commit hooks for general file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--unsafe]
      - id: check-added-large-files
        args: [--maxkb=1000]
      - id: check-merge-conflict
      - id: check-toml
      - id: check-json
      - id: pretty-format-json
        args: [--autofix]
      - id: detect-private-key
      - id: mixed-line-ending
        args: [--fix=lf]

  # 2. Ruff linter - replaces flake8, isort, pyupgrade, and more
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.8
    hooks:
      # Run the linter
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      # Run the formatter
      - id: ruff-format

  # 3. Check for common security issues
  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.2
    hooks:
      - id: bandit
        args: [-c, pyproject.toml]
        additional_dependencies: ["bandit[toml]"]
        exclude: ^tests/

  # 4. Static Type Checking (Mypy)
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.19.0 # Latest stable version
    hooks:
      - id: mypy
        # Mypy is crucial for ensuring type-safety in larger projects.
        # You may need to add dependencies here (e.g., if you use Pydantic)
        # additional_dependencies: ["pydantic==2.7.4"]

  # 5. Pylint - Static code analysis (local hook to use project dependencies)
  - repo: local
    hooks:
      - id: pylint
        name: pylint
        entry: bash -c 'PYTHONPATH=. uv run pylint --rcfile=pyproject.toml --score=y "$@"' --
        language: system
        types: [python]
        exclude: ^(tests/|core/migrations/|_extras/)

  # 6. Typo and Spelling Checker (codespell)
  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.1 # Latest stable version
    hooks:
      - id: codespell
        name: Check for typos/misspellings
        args: [--ignore-words-list, "astroid,selectin"]
        exclude: ^uv\.lock$

  # 8. Run tests (Local hook remains)
  - repo: local
    hooks:
      - id: pytest
        name: Run all tests
        entry: bash -c 'PYTHONPATH=. uv run pytest -n auto tests/'
        language: system
        pass_filenames: false
        always_run: true

# Global settings
default_language_version:
  python: python3.13

# Files to exclude from all hooks
exclude: |
  (?x)(
      ^\.venv/|
      ^venv/|
      ^\.git/|
      ^__pycache__/|
      \.pyc$|
  )

# Fail fast if any hook fails
fail_fast: false
