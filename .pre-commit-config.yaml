# Pre-commit hooks configuration
# See https://pre-commit.com for more information

repos:
  # 1. General file hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--unsafe]
      - id: check-toml
      - id: check-json
      - id: check-added-large-files
        args: [--maxkb=1000]
      - id: check-merge-conflict
      - id: detect-private-key
      - id: mixed-line-ending
        args: [--fix=lf]

  # 2. Ruff — lint (incl. flake8-bandit "S" security rules) and format
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.15
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  # 3. Typo / spelling checker
  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.2
    hooks:
      - id: codespell
        name: Check for typos/misspellings
        exclude: ^uv\.lock$

  # 4. Static type checking — local hook so it uses the project env (matches CI)
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: uv run mypy
        language: system
        types: [python]
        pass_filenames: false

  # 5. Tests — run before push (not on every commit); CI also runs them
  - repo: local
    hooks:
      - id: pytest
        name: Run tests
        entry: uv run pytest -q -n auto tests/
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]

# Use whatever python3 the contributor has (project supports 3.12+)
default_language_version:
  python: python3

# Files to exclude from all hooks
exclude: |
  (?x)(
      ^\.venv/|
      ^venv/|
      ^\.git/|
      ^__pycache__/|
      \.pyc$
  )

fail_fast: false
